<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>甜点小屋呜呜呜 | Sweet Dessert Portfolio</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🍰 Sweet Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link active" href="index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">关于我们</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">联系我们</a></li>
                </ul>
                <div class="d-flex text-white align-items-center">
                    <span id="userStatus" class="me-3">游客未登录</span>
                    <button class="btn btn-outline-light btn-sm me-2" id="loginBtn">登录</button>
                    <a href="cart.html" class="btn btn-warning btn-sm">购物车 🛒 (<span id="cartCount">0</span>)</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="bg-light p-5 text-center bg-image" style="background-color: #fcf8f2 !important;">
        <div class="container py-5">
            <h1 class="display-4 fw-bold text-dark">欢迎来到我们的甜点小屋</h1>
            <p class="lead text-muted">每一款甜点，都是一份手作的治愈与幸福。</p>
            <a href="#menu" class="btn btn-dark btn-lg px-4">浏览今日甜点</a>
        </div>
    </div>

    <div class="container my-5" id="menu">
        <h2 class="text-center mb-4">今日限定主打</h2>

        <div class="row justify-content-center mb-4">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="🔍 搜索您想吃的甜点（如：抹茶...）">
            </div>
        </div>
        
        <div class="row" id="productContainer">
            <div class="text-center text-muted">
                <div class="spinner-border text-warning" role="status"></div>
                <p>正在从服务器加载美味甜点...</p>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 Sweet Shop Dessert Portfolio. Built with Bootstrap.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="app.js"></script>
</body>
</html>
