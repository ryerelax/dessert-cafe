<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会员登录 | 甜点小屋</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🍰 Sweet Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">关于我们</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">联系我们</a></li>
                </ul>
                <div class="d-flex text-white align-items-center">
                    <span id="userStatus" class="me-3">游客未登录</span>
                    <a href="index.html" class="btn btn-outline-light btn-sm me-2">返回首页</a>
                    <a href="cart.html" class="btn btn-warning btn-sm">购物车 🛒 (<span id="cartCount">0</span>)</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5 flex-grow-1 d-flex justify-content-center align-items-center">
        <div class="card shadow-sm p-4" style="width: 100%; max-width: 400px;">
            <h3 class="text-center mb-4 fw-bold">欢迎回来</h3>
            
            <form id="traditionalLoginForm">
                <div class="mb-3">
                    <label class="form-label text-muted small">电子邮箱</label>
                    <input type="email" class="form-control" placeholder="example@gmail.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label text-muted small">密码</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="d-flex justify-content-between mb-3 small">
                    <div>
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">记住我</label>
                    </div>
                    <a href="#" class="text-decoration-none text-muted">忘记密码？</a>
                </div>
                <button type="submit" class="btn btn-dark w-100 mb-3 py-2">登 录</button>
            </form>

            <div class="d-flex align-items-center mb-3">
                <hr class="flex-grow-1 m-0">
                <span class="mx-3 text-muted small">或者使用以下方式</span>
                <hr class="flex-grow-1 m-0">
            </div>

            <button class="btn btn-outline-danger w-100 mb-2 py-2 d-flex align-items-center justify-content-center social-login-btn">
                <i class="fa-brands fa-google me-2 fs-5"></i> Continue with Google
            </button>
            <button class="btn btn-outline-primary w-100 py-2 d-flex align-items-center justify-content-center social-login-btn">
                <i class="fa-brands fa-facebook-f me-2 fs-5"></i> Continue with Facebook
            </button>

            <p class="text-center mt-4 mb-0 small text-muted">
                还没有账号？ <a href="#" class="text-dark fw-bold text-decoration-none">立即注册</a>
            </p>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 Sweet Shop Dessert Portfolio. Built with Bootstrap.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
