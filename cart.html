<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的购物车 | 甜点小屋</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex flex-column min-vh100 bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">🍰 Sweet Shop</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">首页</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">关于我们</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">联系我们</a></li>
                </ul>
                <div class="d-flex text-white align-items-center">
                    <span id="userStatus" class="me-3">游客未登录</span>
                    <button class="btn btn-outline-light btn-sm me-2" id="loginBtn">访客登录</button>
                    <a href="cart.html" class="btn btn-warning btn-sm">购物车 🛒 (<span id="cartCount">0</span>)</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <h2 class="mb-4">您的购物车清单</h2>
        
        <div class="row">
            <div class="col-lg-8 mb-4">
                <div class="card shadow-sm p-4 bg-white">
                    <div class="table-responsive">
                        <table class="table align-middle">
                            <thead>
                                <tr>
                                    <th>甜点名称</th>
                                    <th>单价</th>
                                    <th>数量</th>
                                    <th>小计</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="cartItems">
                                </tbody>
                        </table>
                    </div>
                    <div id="emptyCartMessage" class="text-center py-4 d-none">
                        <p class="text-muted">您的购物车空空如也，快去挑几款甜点吧！</p>
                        <a href="index.html" class="btn btn-dark btn-sm">返回首页</a>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm p-4 bg-white">
                    <h4 class="mb-3">订单摘要</h4>
                    <div class="d-flex justify-content-between mb-3 fs-5">
                        <span>总计金额:</span>
                        <span class="text-danger fw-bold" id="cartTotal">RM 0.00</span>
                    </div>
                    <hr>
                    
                    <form id="paymentForm">
                        <h5 class="mb-3 text-secondary">安全沙盒模拟支付</h5>
                        <div class="mb-3">
                            <label for="bankAcc" class="form-label small text-muted">请输入您的银行账户号码（模拟用）</label>
                            <input type="text" class="form-control" id="bankAcc" placeholder="例如：1234-5678-9012" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold" id="checkoutBtn">确认并模拟支付 💳</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="successModal" data-bs-backdrop="static" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content text-center p-4">
                <div class="modal-body">
                    <h1 class="display-3 text-success mb-3">🎉</h1>
                    <h3 class="fw-bold text-success">模拟支付成功！</h3>
                    <p class="text-muted mt-2" id="paymentDetails"></p>
                    <p class="small text-warning">这是一个纯前端 Portfolio 演示，未发生任何真实交易。</p>
                    <button type="button" class="btn btn-dark px-4 mt-3" id="closeModalBtn">返回首页继续浏览</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">&copy; 2026 Sweet Shop Dessert Portfolio. Built with Bootstrap.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
